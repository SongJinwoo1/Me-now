<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Solutions | الرعاية الطبية الفاخرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modal.css">
</head>
<body>
    <div id="splash">
        <div class="loader-logo">
            <svg width="80" height="80" viewBox="0 0 100 100"><path d="M20 50 Q40 20 60 50 T100 50" fill="none" stroke="#d4af37" stroke-width="8" stroke-linecap="round"/><circle cx="50" cy="70" r="8" fill="#d4af37"/></svg>
            <h2 style="color:#d4af37; margin-top:15px;">Calm Solutions</h2>
        </div>
    </div>

    <header id="main-header">
        <div class="logo">
            <svg width="45" height="45" viewBox="0 0 100 100"><path d="M20 50 Q40 20 60 50 T100 50" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round"/><circle cx="50" cy="70" r="8" fill="currentColor"/></svg>
            <span>Calm Solutions</span>
        </div>
        <div class="nav-btns">
            <button id="theme-toggle" class="btn-outline">الوضع الليلي</button>
            <a href="#" onclick="alert('سيتم ربط هذا الزر برابط لوحة التحكم قريباً')" class="btn-outline">دخول الأطباء</a>
        </div>
    </header>

    <section class="hero">
        <h1>رعاية صحية تليق بك</h1>
        <p>نظام ذكي متكامل يوفر لك الهدوء والاحترافية في كل خطوة.</p>
        <button id="open-booking" class="btn-primary">احجز استشارتك الآن</button>
    </section>

    <section class="services">
        <div class="card"><h3>استشارة عامة</h3><p>تشخيص دقيق وحلول مبتكرة.</p></div>
        <div class="card"><h3>متابعة دورية</h3><p>رعاية مستمرة لحالة صحية أفضل.</p></div>
        <div class="card"><h3>طوارئ 24/7</h3><p>فريق جاهز للتدخل السريع.</p></div>
    </section>

    <a href="https://wa.me/96597805334" class="whatsapp-fab" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

    <div id="booking-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>طلب حجز موعد</h3>
            <form id="booking-form">
                <input type="text" placeholder="الاسم الكامل" required>
                <select required>
                    <option value="">اختر الخدمة</option>
                    <option>استشارة</option><option>متابعة</option>
                </select>
                <input type="date" id="booking-date" required>
                <button type="submit" class="btn-primary w-100">تأكيد الطلب</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
    <script src="booking.js"></script>
</body>
</html>
